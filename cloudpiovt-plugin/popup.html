<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>云枢开发助手</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <div class="hero-header">
          <h1>云枢开发助手</h1>
          <div class="hero-launchers">
            <button id="open-vscode-btn" class="editor-launch-btn vscode-btn" type="button" aria-label="用 VS Code 打开目标目录">
              <span class="editor-launch-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M17.6 2.2 7.7 11.1 4.6 8.7 2.1 10l3.8 3.4-3.8 3.4 2.5 1.3 3.1-2.4 9.9 8.9c.6.5 1.5.1 1.5-.7V2.9c0-.8-.9-1.2-1.5-.7Z"></path>
                </svg>
              </span>
              <span>VS Code</span>
            </button>
            <button id="open-idea-btn" class="editor-launch-btn idea-btn" type="button" aria-label="用 IDEA 打开目标目录">
              <span class="editor-launch-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <defs>
                    <linearGradient id="idea-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#ff7a00"></stop>
                      <stop offset="50%" stop-color="#ff2d55"></stop>
                      <stop offset="100%" stop-color="#0078ff"></stop>
                    </linearGradient>
                  </defs>
                  <path d="M3 8.1 8.3 3h12.7v12.7L15.7 21H3z" fill="url(#idea-gradient)"></path>
                  <path d="M6 6h12v12H6z" fill="#111"></path>
                  <path d="M9 9h1.4v5H9zM10.5 13.2c0 .6-.1 1-.4 1.4-.4.5-1 .8-1.8.8H8v-1.1h.2c.7 0 1-.4 1-1.1V9h1.3zM12 9h4v1.2h-1.3V15h-1.4v-4.8H12z" fill="#fff"></path>
                </svg>
              </span>
              <span>IDEA</span>
            </button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="meta-row">
          <span class="meta-label">当前页面</span>
          <button id="page-origin" class="copy-chip" type="button" disabled>检测中...</button>
        </div>
        <div class="meta-row">
          <span class="meta-label">目录句柄</span>
          <div class="meta-value meta-value-inline">
            <span id="target-handle">未授权</span>
            <button id="refresh-handle-btn" class="icon-btn" type="button" title="更新目标目录" aria-label="更新目标目录">↻</button>
          </div>
        </div>
        <div class="meta-row">
          <span class="meta-label">绝对路径</span>
          <button id="target-path" class="copy-chip" type="button" disabled>未保存</button>
        </div>
      </section>

      <section class="actions">
        <div class="action-row">
          <button id="frontend-capture-write-btn" class="accent-btn" type="button">前端抓取写入</button>
          <button id="frontend-writeback-btn" class="secondary-btn" type="button">前端回写</button>
        </div>

        <div class="action-row">
          <button id="bizrule-capture-write-btn" class="accent-btn" type="button">业务规则抓取写入</button>
          <button id="bizrule-writeback-btn" class="secondary-btn" type="button">业务规则回写</button>
        </div>
      </section>

      <section class="card status-card">
        <div class="status-header">
          <span>执行状态</span>
          <button id="open-options-btn" class="link-btn" type="button">设置</button>
        </div>
        <pre id="status-output" class="status-output">等待操作。</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
