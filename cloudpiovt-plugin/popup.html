<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>云枢开发助手</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <h1>云枢开发助手</h1>
        <!-- <p class="subtitle">固定支持 VS Code 和 IDEA。抓取与文件映射使用代码默认行为。</p> -->
      </section>

      <section class="card">
        <div class="meta-row meta-row-stack">
          <span class="meta-label">当前页面</span>
          <span id="page-origin" class="meta-value meta-value-full">检测中...</span>
        </div>
        <div class="meta-row meta-row-stack">
          <span class="meta-label">目标文件夹路径</span>
          <span id="target-directory-path" class="meta-value meta-value-full">更新目录句柄后自动回填</span>
          <!-- <span class="field-hint">抓取和回写会使用当前页面类型对应的默认文件名。</span> -->
        </div>
        <div class="meta-row">
          <span class="meta-label">目录句柄</span>
          <div class="meta-value meta-value-inline">
            <span id="target-handle">尚未选择</span>
            <button id="refresh-handle-btn" class="icon-btn" type="button" title="更新目录句柄" aria-label="更新目录句柄">↻</button>
          </div>
        </div>
      </section>

      <section class="actions">
        <div class="action-row">
          <button id="capture-write-btn" class="accent-btn" type="button">抓取并写入</button>
          <button id="import-write-btn" class="secondary-btn" type="button">从文件夹回写</button>
        </div>

        <div class="action-row">
          <button id="open-vscode-btn" class="launch-btn" type="button">用 VS Code 打开</button>
          <button id="open-idea-btn" class="ghost-launch-btn" type="button">用 IDEA 打开</button>
        </div>
      </section>

      <section class="card status-card">
        <div class="status-header">
          <span>执行状态</span>
          <button id="open-options-btn" class="link-btn" type="button">设置</button>
        </div>
        <pre id="status-output" class="status-output">等待操作。</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
