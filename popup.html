<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>开发助手</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <div class="hero-header">
          <h1>开发助手</h1>
          <div class="hero-launchers">
            <div class="launcher-control" id="launcher-control">
              <button id="launcher-main-btn" class="launcher-main-btn" type="button" aria-label="打开默认软件" disabled>
                <img id="launcher-main-icon" class="launcher-main-icon" src="assets/icons/launchers/file-explorer-16.png" alt="">
              </button>
              <button id="launcher-menu-btn" class="launcher-menu-btn" type="button" aria-label="展开打开方式" aria-expanded="false" aria-controls="launcher-menu" disabled>
                <span aria-hidden="true">▾</span>
              </button>
              <div id="launcher-menu" class="launcher-menu" role="menu" hidden></div>
            </div>
          </div>
        </div>
        <div class="platform-tabs" role="tablist" aria-label="开发平台">
          <button id="cloudpivot-tab" class="platform-tab is-active" type="button" role="tab" aria-selected="true" aria-controls="cloudpivot-panel" data-platform-tab="cloudpivot">云枢</button>
          <button id="h3yun-tab" class="platform-tab" type="button" role="tab" aria-selected="false" aria-controls="h3yun-panel" data-platform-tab="h3yun">氚云</button>
        </div>
      </section>

      <section class="card">
        <div class="meta-row">
          <span class="meta-label">当前页面</span>
          <button id="page-origin" class="copy-chip" type="button" disabled>检测中...</button>
        </div>
        <div class="meta-row">
          <span class="meta-label">当前路径</span>
          <div class="meta-value meta-value-inline">
            <span id="target-handle">未选择目录</span>
            <button id="refresh-handle-btn" class="icon-btn" type="button" title="更新当前路径" aria-label="更新当前路径">↻</button>
          </div>
        </div>
        <div id="target-path-section" class="meta-row-stack path-section" hidden>
          <div class="meta-row">
            <span class="meta-label">历史目录</span>
            <button id="target-path-toggle" class="path-toggle-btn" type="button" aria-expanded="false" aria-controls="target-path-panel">
              <span id="target-path-summary" class="path-toggle-summary">暂无历史目录</span>
              <span class="path-toggle-arrow" aria-hidden="true">▾</span>
            </button>
          </div>
          <div id="target-path-panel" class="path-panel" hidden>
            <div id="recent-paths" class="recent-paths">
              <p id="recent-paths-empty" class="recent-paths-empty" hidden>暂无历史目录</p>
              <ul id="recent-paths-list" class="recent-paths-list" hidden></ul>
            </div>
          </div>
        </div>
      </section>

      <section id="cloudpivot-panel" class="platform-panel platform-panel-active" role="tabpanel" aria-labelledby="cloudpivot-tab" data-platform-panel="cloudpivot">
        <section class="actions">
          <div class="action-row">
            <button id="frontend-capture-write-btn" class="accent-btn" type="button">前端抓取写入</button>
            <button id="frontend-writeback-btn" class="secondary-btn" type="button">前端回写</button>
          </div>

          <div class="action-row">
            <button id="bizrule-capture-write-btn" class="accent-btn" type="button">业务规则抓取写入</button>
            <button id="bizrule-writeback-btn" class="secondary-btn" type="button">业务规则回写</button>
          </div>
        </section>
      </section>

      <section id="h3yun-panel" class="platform-panel" role="tabpanel" aria-labelledby="h3yun-tab" data-platform-panel="h3yun" hidden>
        <section class="card h3yun-card">
          <div class="platform-card-header">
            <span class="platform-name">氚云</span>
          </div>
          <div class="action-row action-row-single">
            <button id="h3yun-capture-all-btn" class="accent-btn" type="button">一键抓取写入</button>
          </div>
          <div class="action-row">
            <button id="h3yun-frontend-writeback-btn" class="secondary-btn" type="button">前端代码回写</button>
            <button id="h3yun-backend-writeback-btn" class="secondary-btn" type="button">后端代码回写</button>
          </div>
        </section>
      </section>

      <section class="card status-card">
        <div class="status-header">
          <span>执行状态</span>
          <div class="status-actions">
            <button id="copy-log-btn" class="link-btn" type="button">复制日志</button>
            <button id="export-log-btn" class="link-btn" type="button">导出日志</button>
            <button id="export-diagnostic-btn" class="link-btn" type="button">导出诊断</button>
            <button id="open-options-btn" class="link-btn" type="button">设置</button>
          </div>
        </div>
        <pre id="status-output" class="status-output">等待操作。</pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
