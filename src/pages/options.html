<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>开发助手 - 设置</title>
    <link rel="stylesheet" href="options.css">
    <link rel="stylesheet" href="options-layout.css">
  </head>
  <body>
    <main class="page-shell">
      <!-- 顶栏 sticky -->
      <header class="top-bar">
        <div class="top-bar-brand">
          <span class="top-bar-plugin">CLOUDPIOVT PLUGIN</span>
          <h1 class="top-bar-title">开发助手设置</h1>
        </div>
        <div class="top-bar-status" id="top-bar-status"></div>
        <div class="top-bar-actions">
          <button id="expand-all-btn" class="ghost-btn-sm" type="button" title="全部展开">≡</button>
          <button id="save-btn" class="save-btn" type="button">保存</button>
          <button id="reset-btn" class="ghost-btn-sm" type="button">恢复</button>
        </div>
      </header>

      <!-- 状态栏 toast -->
      <div class="toast" id="toast" hidden></div>

      <!-- 分区一：默认目录 -->
      <section class="section" data-section="defaultdir">
        <div class="section-head" role="button" tabindex="0" aria-expanded="true">
          <span class="section-arrow">▲</span>
          <h2 class="section-title">默认目录</h2>
          <p class="section-desc">当页面没有已选目录时自动使用对应平台的默认路径。</p>
        </div>
        <div class="section-body">
          <div class="default-dir-row">
            <label class="dir-platform-select">
              <span class="field-label-inline">平台</span>
              <select id="default-dir-platform">
                <option value="cloudpivot">云枢</option>
                <option value="h3yun">氚云</option>
              </select>
            </label>
            <label class="dir-path-field">
              <span class="field-label-inline">目录</span>
              <input id="default-dir-path" type="text" placeholder="例如：D:\Projects\workspace">
            </label>
            <button id="pick-default-dir-btn" class="ghost-btn-sm" type="button">选择</button>
          </div>
        </div>
      </section>

      <!-- 分区三：更新与文件生成 -->
      <section class="section" data-section="update">
        <div class="section-head" role="button" tabindex="0" aria-expanded="true">
          <span class="section-arrow">▲</span>
          <h2 class="section-title">更新与文件生成</h2>
          <p class="section-desc" id="update-section-desc">版本、更新偏好与按平台文件生成开关。</p>
        </div>
        <div class="section-body">
          <!-- 版本横幅：仅在有新版本时显示 -->
          <div class="update-banner" id="update-banner" hidden>
            <span class="update-banner-text" id="update-banner-text"></span>
            <div class="update-banner-actions">
              <button id="check-update-btn" class="ghost-btn-sm" type="button">检查更新</button>
              <button id="sync-update-btn" class="ghost-btn-sm" type="button" hidden>同步更新</button>
            </div>
          </div>

          <!-- 无更新时显示当前版本信息 -->
          <div class="update-status-text" id="update-status-text">尚未检查更新。</div>

          <div class="update-prefs">
            <label class="toggle-inline">
              <input id="auto-check-updates" type="checkbox">
              <span class="toggle-track" aria-hidden="true"></span>
              <span>启动时自动检查更新</span>
            </label>
            <span class="update-last-check" id="update-last-check"></span>
          </div>

          <div class="update-sub-sep"></div>

          <!-- 文件生成 + 氚云回写模式 -->
          <div class="genfiles-area">
            <div class="genfiles-header">
              <label class="dir-platform-select">
                <span class="field-label-inline">平台</span>
                <select id="genfiles-platform">
                  <option value="cloudpivot">云枢</option>
                  <option value="h3yun">氚云</option>
                </select>
              </label>
            </div>
            <div class="genfiles-toggles" id="genfiles-toggles"></div>
          </div>

          <div class="update-sub-sep"></div>

          <label class="toggle-inline">
            <input id="h3yun-oneclick-writeback" type="checkbox">
            <span class="toggle-track" aria-hidden="true"></span>
            <span>氚云一键回写模式（开启时弹窗显示"一键回写"按钮）</span>
          </label>

          <!-- 诊断工具折叠 -->
          <details class="log-fold" id="log-fold">
            <summary class="log-fold-summary">诊断工具</summary>
            <div class="log-fold-body">
              <p id="last-diagnostic-summary" class="diagnostic-summary">最近诊断：未生成</p>
              <div class="action-row">
                <button id="copy-diagnostic-summary-btn" class="ghost-btn-sm" type="button">复制诊断摘要</button>
                <button id="export-last-diagnostic-btn" class="ghost-btn-sm" type="button">导出最近诊断</button>
              </div>
              <pre id="status-output" class="status-output">正在加载...</pre>
            </div>
          </details>
        </div>
      </section>

      <!-- 分区四：帮助 -->
      <section class="section" data-section="help">
        <div class="section-head" role="button" tabindex="0" aria-expanded="true">
          <span class="section-arrow">▲</span>
          <h2 class="section-title">版本更新记录</h2>
        </div>
        <div class="section-body">
          <div class="release-pills" id="release-pills"></div>
          <div class="release-compact" id="release-compact"></div>
          <button id="release-more-btn" class="ghost-btn-sm" type="button" hidden>查看全部</button>
          <div class="release-full" id="release-full" hidden></div>
        </div>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
